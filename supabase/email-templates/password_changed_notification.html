<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password changed — CaseLink</title>
  <style type="text/css">
    body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
    table { border-collapse: collapse; }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #eef1f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #334155;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #eef1f4; padding: 32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 420px; background-color: #ffffff; border-radius: 16px; border: 1px solid rgba(15, 23, 42, 0.08); box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.06);">
          <tr>
            <td style="padding: 32px 28px; text-align: center;">
              <div style="display: inline-block; width: 44px; height: 44px; line-height: 44px; background-color: #0f766e; color: #ffffff; font-size: 14px; font-weight: 700; border-radius: 12px; margin-bottom: 20px;">CL</div>
              <h1 style="margin: 0 0 8px 0; font-size: 20px; font-weight: 600; color: #0f172a; letter-spacing: -0.02em;">CaseLink</h1>
              <p style="margin: 0 0 24px 0; font-size: 14px; color: #64748b;">Security notification</p>
            </td>
          </tr>
          <tr>
            <td style="padding: 0 28px 24px 28px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;">
                <tr>
                  <td style="padding: 24px;">
                    <h2 style="margin: 0 0 16px 0; font-size: 16px; font-weight: 600; color: #0f172a;">Your password has been changed</h2>
                    <p style="margin: 0 0 16px 0; font-size: 15px; color: #334155;">This is a confirmation that the password for your account {{ .Email }} was recently changed.</p>
                    <p style="margin: 0; font-size: 14px; color: #64748b;">If you did not make this change, please contact support immediately.</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding: 0 28px 32px 28px; border-top: 1px solid #e2e8f0;">
              <p style="margin: 24px 0 0 0; font-size: 12px; color: #94a3b8;">Case management workspace for families and community resources.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
